name: Prebuild curated bundles

on:
  schedule:
    # Sundays at 09:00 UTC (~ early Sunday morning US time)
    - cron: "0 9 * * 0"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/prebuild-curated
        env:
          PREBUILD_TRIGGER_TOKEN: ${{ secrets.PREBUILD_TRIGGER_TOKEN }}
        run: |
          set -euo pipefail
          response=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X POST https://rsb-defuddle.fly.dev/api/prebuild-curated \
            -H "x-prebuild-token: $PREBUILD_TRIGGER_TOKEN")
          echo "HTTP $response"
          cat /tmp/body
          echo
          # 200 (started) or 202 are fine; anything else fails the job.
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            exit 1
          fi
