name: Prebuild curated bundles

# Scheduled runs always target production. Manual runs can pick the
# preview app (rsb-defuddle) via workflow_dispatch.
on:
  schedule:
    # Sundays at 09:00 UTC
    - cron: "0 9 * * 0"
  workflow_dispatch:
    inputs:
      target:
        description: "Which app to rebuild"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - preview
      bundle:
        description: "Bundle name (leave empty for all)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          # Rock v19+ topic books (weekly cadence)
          - rock-core-concepts
          - rock-church-management
          - rock-engagement
          - rock-digital-publishing
          - rock-supporting-rock
          # Version-agnostic hub bundles (weekly cadence)
          - rock-advanced
          - rock-mobile
          - rock-developer
          # Rock v18 and earlier (monthly cadence; naming one here
          # always rebuilds it regardless of cadence)
          - rock-user
          - rock-administration
          - rock-hosting

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target host
        id: target
        run: |
          choice="${{ github.event.inputs.target }}"
          if [ -z "$choice" ]; then choice="prod"; fi
          if [ "$choice" = "preview" ]; then
            echo "host=rsb-defuddle.fly.dev" >> "$GITHUB_OUTPUT"
          else
            echo "host=rockumentation-skill-builder.fly.dev" >> "$GITHUB_OUTPUT"
          fi
          echo "Target: $choice"
      - name: POST /api/prebuild-curated
        env:
          PREBUILD_TRIGGER_TOKEN: ${{ secrets.PREBUILD_TRIGGER_TOKEN }}
          HOST: ${{ steps.target.outputs.host }}
          BUNDLE: ${{ github.event.inputs.bundle }}
        run: |
          set -euo pipefail
          url="https://$HOST/api/prebuild-curated"
          if [ -n "$BUNDLE" ]; then
            url="$url?bundle=$BUNDLE"
            echo "Bundle: $BUNDLE"
          else
            echo "Bundle: (all)"
          fi
          response=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -X POST "$url" \
            -H "x-prebuild-token: $PREBUILD_TRIGGER_TOKEN")
          echo "HTTP $response"
          cat /tmp/body
          echo
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            exit 1
          fi
