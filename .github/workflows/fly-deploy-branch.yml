# Deploys non-main branches to their own Fly app for preview/testing.
# App name pattern: rockumentation-skill-builder-<slugified-branch>
# URL: https://rockumentation-skill-builder-<branch>.fly.dev
#
# To tear down a preview app when you're done with the branch:
#   flyctl apps destroy rockumentation-skill-builder-<branch>

name: Fly Deploy (branch preview)
on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy preview app
    runs-on: ubuntu-latest
    concurrency: deploy-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Compute preview app name
        id: app
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          # Slugify: lowercase, non-alnum -> '-', collapse, trim '-'
          SLUG=$(echo "$BRANCH" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g')
          # Fly app names max 30 chars. Use a short prefix so the branch
          # slug survives intact for readability.
          PREFIX="rsb-"
          MAX_SLUG=$((30 - ${#PREFIX}))
          SLUG="${SLUG:0:$MAX_SLUG}"
          SLUG="${SLUG%-}"
          NAME="${PREFIX}${SLUG}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Preview app: $NAME"

      - name: Ensure Fly app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if ! flyctl apps list --json | grep -q "\"Name\": *\"${{ steps.app.outputs.name }}\""; then
            flyctl apps create "${{ steps.app.outputs.name }}" --org personal
          fi

      - name: Set required secrets on preview app
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # List of required secrets
          for key in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_ENDPOINT_URL_S3 AWS_REGION BUCKET_NAME ANTHROPIC_API_KEY; do
            val=$(flyctl secrets list --app rockumentation-skill-builder | awk -v k="$key" '$1==k {print $1}')
            if [ -n "$val" ]; then
              # Get the value from the main app and set it on the preview app
              secret_val=$(flyctl secrets download --app rockumentation-skill-builder --name "$key" | grep -v '^#' | cut -d= -f2-)
              flyctl secrets set "$key=$secret_val" --app "${{ steps.app.outputs.name }}"
            fi
          done

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy --remote-only \
            --app "${{ steps.app.outputs.name }}" \
            --config fly.toml

      - name: Summary
        run: |
          echo "Deployed to: https://${{ steps.app.outputs.name }}.fly.dev" >> "$GITHUB_STEP_SUMMARY"
